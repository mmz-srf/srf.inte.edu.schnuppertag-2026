<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerade oder ungerade?</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 20px;
            padding: 32px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #c4001a;
        }

        p {
            color: #555;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 16px;
            text-align: center;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #c4001a;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #a30016;
        }

        #result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            min-height: 28px;
            background: #f8f8f8;
        }

        .error {
            background: #ffe0e0;
            color: #a00000;
        }

        .success {
            background: #e8f7e8;
            color: #1f6b1f;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Gerade oder ungerade?</h1>
    <p>Gib eine ganze Zahl ein und prüfe, ob sie gerade oder ungerade ist.</p>

    <input
            type="number"
            id="numberInput"
            placeholder="Zum Beispiel: 7"
            autofocus
    />

    <button id="checkButton">Prüfen</button>

    <div id="result"></div>
</div>

<script>
    const numberInput = document.getElementById("numberInput");
    const checkButton = document.getElementById("checkButton");
    const result = document.getElementById("result");

    function geradeOderUngerade(zahl) {
        // TODO
        // -- falls gerade, soll der String "gerade" zurückgegeben
        // -- falls ungerade, soll der String "ungerade" zurückgegeben
    }

    function pruefen() {
        const eingabe = numberInput.value.trim();

        if (eingabe === "") {
            result.textContent = "Bitte zuerst eine Zahl eingeben.";
            result.className = "error";
            return;
        }

        const zahl = Number(eingabe);

        if (!Number.isInteger(zahl)) {
            result.textContent = "Bitte eine ganze Zahl eingeben.";
            result.className = "error";
            return;
        }

        const typ = geradeOderUngerade(zahl);
        result.textContent = `Die Zahl ${zahl} ist ${typ}.`;
        result.className = "success";
    }

    checkButton.addEventListener("click", pruefen);

    numberInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            pruefen();
        }
    });
</script>
</body>
</html>
